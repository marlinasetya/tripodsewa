<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Tripod & Video Booth ✨</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/style.css" rel="stylesheet">
    <link href="assets/style_enhanced.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        .ultimate-hero { 
            height: 100vh; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            background-image: url('uploads/gallery/69db30b53b7a5.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            opacity: 0.95;
            position: relative;
        }

        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            font-size: clamp(2rem, 8vw, 6rem);
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        .float-item:nth-child(1) { top: 10%; left: 10%; }
        .float-item:nth-child(2) { top: 60%; right: 10%; animation-delay: -5s; }
        .float-item:nth-child(3) { bottom: 20%; left: 20%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-title {
            font-size: clamp(2.8rem, 8vw, 6rem);
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            animation: titleGlow 3s ease-in-out infinite alternate;
            text-shadow: 0 0 60px rgba(255,255,255,0.5);
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 20px #f093fb); }
            to { filter: drop-shadow(0 0 60px #4facfe); }
        }

        .subtitle {
            font-size: clamp(1.1rem, 3vw, 2rem);
            color: #ffffff;
            text-align: center;
            margin: 1rem 0 3rem;
        }

        .cta-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-ultimate {
            padding: 1.2rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            transition: 0.3s;
        }

        .btn-login {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-register {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-ultimate:hover {
            transform: scale(1.05);
        }

        .slideshow-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s;
            background-size: cover;
            background-position: center;
        }

        .slideshow-slide.active {
            opacity: 1;
        }

        .demo-bar {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            padding: 1rem 2rem;
            border-radius: 50px;
            color: white;
        }
    </style>
</head>

<body class="d-flex align-items-center min-vh-100 p-3">

<div class="ultimate-hero w-100 rounded-5 overflow-hidden">

    <!-- Floating -->
    <div class="floating-icons">
        <div class="float-item">📷</div>
        <div class="float-item">🎥</div>
        <div class="float-item">⭐</div>
    </div>

    <!-- Slideshow -->
    <div class="slideshow-container position-absolute w-100 h-100">
        <div class="slideshow-slide active" style="background-image: url('uploads/gallery/69db4d5f9f1dc.jpg');"></div>
        <div class="slideshow-slide" style="background-image: url('uploads/gallery/69db30b53b7a5.jpg');"></div>
        <div class="slideshow-slide" style="background-image: url('uploads/gallery/69db4f436b009.jpg');"></div>
    </div>

    <!-- Content -->
    <div class="d-flex flex-column justify-content-center align-items-center h-100 text-center px-4">

        <h1 class="main-title mb-4">
            📷 Sewa Tripod & Video Booth
        </h1>

        <p class="subtitle">Solusi Profesional untuk Konten Video Anda ✨</p>

        <div class="cta-buttons">
            <a href="login.html" class="btn btn-login btn-ultimate">Login</a>
            <a href="register.html" class="btn btn-register btn-ultimate">Daftar</a>
        </div>

        <div class="demo-bar mt-4">
            Admin • User • Petugas
        </div>

    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const slides = document.querySelectorAll('.slideshow-slide');
let current = 0;

setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
}, 5000);
</script>

</body>
</html>
